<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTrack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    /* Header */
    header {
      background: #111;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.2rem; }

    nav { display: flex; gap: 10px; align-items: center; }

    nav button {
      background: transparent;
      border: 1px solid #555;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    nav button:hover, nav button.active {
      background: white;
      border-color: white;
      color: #111;
    }

    #logout-btn {
      background: transparent;
      border: 1px solid #555;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      display: none;
    }

    #logout-btn:hover { border-color: white; color: white; }

    /* Container */
    .container {
      max-width: 800px;
      margin: 28px auto;
      padding: 0 16px;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* Auth */

    .auth-title{
        text-align: center;
    }
    
    .auth-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-width: 380px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .auth-card h2 {
      font-size: 1.1rem;
      margin-bottom: 18px;
      color: #111;
    }

    .tabs {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 2px solid #eee;
    }

    .tabs button {
      flex: 1;
      padding: 9px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #888;
      font-weight: 500;
    }

    .tabs button.active {
      color: #111;
      border-bottom: 2px solid #111;
      margin-bottom: -2px;
    }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #111;
    }

    .btn-block {
      width: 100%;
      padding: 10px;
      background: #111;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn-block:hover { background: #333; }

    .error-msg {
      color: #c00;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* Page header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .page-header h2 { font-size: 1.1rem; color: #111; }

    .btn-add {
      background: #111;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-add:hover { background: #333; }

    /* Simple stat line */
    .stat-line {
      font-size: 13px;
      color: #555;
      margin-bottom: 16px;
    }

    .stat-line strong { color: #111; }

    /* Section label */
    .section-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    /* Workout card */
    .workout-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 13px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .workout-card.done {
      background: #f5f5f5;
      border-color: #bbb;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #bbb;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .workout-card.done .check-btn {
      background: #111;
      border-color: #111;
      color: white;
    }

    .workout-info { flex: 1; }

    .workout-name {
      font-size: 14px;
      font-weight: 500;
    }

    .workout-card.done .workout-name {
      text-decoration: line-through;
      color: #999;
    }

    .workout-meta {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }

    .empty-state {
      text-align: center;
      padding: 36px 20px;
      color: #bbb;
      font-size: 13px;
      border: 1px dashed #ddd;
      border-radius: 8px;
      background: white;
    }

    /* Report list */
    .report-item {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .report-day {
      color: #888;
      min-width: 50px;
      font-size: 12px;
    }

    .report-name { flex: 1; font-weight: 500; }

    .report-mins { color: #888; font-size: 12px; }

    .done-badge {
      background: #111;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 10px 8px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 8px;
      width: 100%;
      max-width: 340px;
      padding: 24px;
      margin: 16px;
      border: 1px solid #ddd;
    }

    .modal h3 {
      font-size: 1rem;
      margin-bottom: 16px;
    }

    .modal .form-group select,
    .modal .form-group input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      background: white;
    }

    .modal .form-group select:focus,
    .modal .form-group input:focus {
      outline: none;
      border-color: #111;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 9px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-confirm {
      background: #111;
      color: white;
      border: none;
    }

    .btn-confirm:hover { background: #333; }

    .btn-cancel {
      background: white;
      border: 1px solid #ccc;
      color: #555;
    }

    .btn-cancel:hover { background: #f5f5f5; }

    .modal-error {
      color: #c00;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .modal-error.show { display: block; }
  </style>
</head>
<body>

<header>
  <h1>🏋️ FitTrack</h1>
  <nav>
    <span id="nav-links"></span>
    <button id="logout-btn" onclick="doLogout()">Logout</button>
  </nav>
</header>

<div class="container">

  <!-- AUTH -->
  <div class="page active" id="page-auth">
    <div class="auth-card">
      <h2 class="auth-title">Welcome to FitTrack</h2>
      <div class="tabs">
        <button class="active" onclick="switchTab('login')">Login</button>
        <button onclick="switchTab('register')">Register</button>
      </div>

      <div id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pw" placeholder="Password">
        </div>
        <div class="error-msg" id="login-error">Invalid email or password.</div>
        <button class="btn-block" onclick="doLogin()">Login</button>
      </div>

      <div id="register-form" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your Name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password (min 6 characters)</label>
          <input type="password" id="reg-pw" placeholder="Password">
        </div>
        <div class="error-msg" id="reg-error"></div>
        <button class="btn-block" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- SCHEDULE -->
  <div class="page" id="page-schedule">
    <div class="page-header">
      <h2>Weekly Schedule</h2>
      <button class="btn-add" onclick="openAddModal()">+ Add Workout</button>
    </div>
    <div class="stat-line" id="schedule-stat"></div>
    <div class="section-label">Workouts This Week</div>
    <div id="workout-list"></div>
  </div>

  <!-- REPORT -->
  <div class="page" id="page-report">
    <div class="page-header">
      <h2>Report</h2>
    </div>
    <div class="stat-line" id="report-stat"></div>
    <div class="section-label">Completed Workouts</div>
    <div id="report-list"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Add Workout</h3>
    <div class="form-group">
      <label>Day</label>
      <select id="modal-day">
        <option value="0">Monday</option>
        <option value="1">Tuesday</option>
        <option value="2">Wednesday</option>
        <option value="3">Thursday</option>
        <option value="4">Friday</option>
        <option value="5">Saturday</option>
        <option value="6">Sunday</option>
      </select>
    </div>
    <div class="form-group">
      <label>Exercise</label>
      <select id="modal-exercise">
        <optgroup label="Strength">
          <option>Bench Press</option>
          <option>Deadlift</option>
          <option>Squats</option>
          <option>Pull-ups</option>
          <option>Shoulder Press</option>
        </optgroup>
        <optgroup label="Cardio">
          <option>Running</option>
          <option>Cycling</option>
          <option>Swimming</option>
          <option>Jump Rope</option>
        </optgroup>
        <optgroup label="HIIT">
          <option>Burpees</option>
          <option>Kettlebell</option>
          <option>Sprint Intervals</option>
        </optgroup>
        <optgroup label="Yoga & Stretch">
          <option>Vinyasa Flow</option>
          <option>Stretching</option>
          <option>Pilates</option>
        </optgroup>
      </select>
    </div>
    <div class="form-group">
      <label>Duration (minutes)</label>
      <input type="number" id="modal-duration" value="30" min="1" max="300">
      <div class="modal-error" id="modal-duration-error"></div>
    </div>
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmModal()">Add Workout</button>
    </div>
  </div>
</div>

<script>
  let users = JSON.parse(localStorage.getItem('ft_users') || 'null');
    if (!users) {
      users = [];
      localStorage.setItem('ft_users', JSON.stringify(users));
    }

    window.onload = function () {
      const savedEmail = localStorage.getItem('ft_session');
      if (savedEmail) {
        const user = users.find(u => u.email === savedEmail);
        if (user) { loginUser(user); return; }
      }
      showPage('auth');
    };

  let currentUser = null;
  let workouts = [];

  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  // ── Auth ──
  function switchTab(tab) {
    document.querySelectorAll('.tabs button').forEach((b, i) =>
      b.classList.toggle('active', (i === 0) === (tab === 'login'))
    );
    document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  function doLogin() {
    const email = document.getElementById('login-email').value.trim().toLowerCase();
    const pw    = document.getElementById('login-pw').value;
    const user = users.find(u => u.email.toLowerCase() === email && u.password === btoa(pw));
    if (!user) { document.getElementById('login-error').classList.add('show'); return; }
    document.getElementById('login-error').classList.remove('show');
    loginUser(user);
  }

  function doRegister() {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim().toLowerCase();
    const pw    = document.getElementById('reg-pw').value;
    const errEl = document.getElementById('reg-error');
    if (!name || !email || !pw) { errEl.textContent = 'All fields are required.'; errEl.classList.add('show'); return; }
    if (pw.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.add('show'); return; }
    if (users.find(u => u.email.toLowerCase() === email)) { errEl.textContent = 'Email already registered.'; errEl.classList.add('show'); return; }
    const user = { name, email, password: btoa(pw) };
    users.push(user);
    localStorage.setItem('ft_users', JSON.stringify(users));
    loginUser(user);
  }

  function loginUser(user) {
    currentUser = user;
    workouts = JSON.parse(localStorage.getItem('ft_workouts_' + user.email) || '[]');
    localStorage.setItem('ft_session', user.email);
    document.getElementById('nav-links').innerHTML = `
      <button onclick="showPage('schedule')" id="nav-schedule">Schedule</button>
      <button onclick="showPage('report')" id="nav-report">Report</button>
    `;
    document.getElementById('logout-btn').style.display = 'block';
    showPage('schedule');
  }

  function doLogout() {
    currentUser = null;
    workouts = [];
    localStorage.removeItem('ft_session');
    document.getElementById('nav-links').innerHTML = '';
    document.getElementById('logout-btn').style.display = 'none';
    showPage('auth');
  }

  function saveWorkouts() {
    if (currentUser) localStorage.setItem('ft_workouts_' + currentUser.email, JSON.stringify(workouts));
  }

  // ── Navigation ──
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('#nav-links button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    const btn = document.getElementById('nav-' + id);
    if (btn) btn.classList.add('active');
    if (id === 'schedule') renderSchedule();
    if (id === 'report')   renderReport();
  }

  // ── Schedule ──
  function renderSchedule() {
    const done  = workouts.filter(w => w.done).length;
    const total = workouts.length;
    document.getElementById('schedule-stat').innerHTML =
      total === 0 ? '' : `<strong>${done} / ${total}</strong> workouts completed this week`;

    const listEl = document.getElementById('workout-list');
    if (total === 0) {
      listEl.innerHTML = '<div class="empty-state">No workouts yet. Click "+ Add Workout" to get started!</div>';
      return;
    }
    listEl.innerHTML = '';
    DAYS.forEach((day, i) => {
      const dws = workouts.filter(w => w.dayIndex === i);
      if (!dws.length) return;
      const label = document.createElement('div');
      label.className = 'section-label';
      label.style.marginTop = '14px';
      label.textContent = day;
      listEl.appendChild(label);
      dws.forEach(w => listEl.appendChild(buildCard(w)));
    });
  }

  function buildCard(w) {
    const div = document.createElement('div');
    div.className = 'workout-card' + (w.done ? ' done' : '');
    div.innerHTML = `
      <button class="check-btn" onclick="toggleDone('${w.id}')">${w.done ? '✓' : ''}</button>
      <div class="workout-info">
        <div class="workout-name">${w.name}</div>
        <div class="workout-meta">${DAYS[w.dayIndex]} · ${w.duration} min</div>
      </div>
    `;
    return div;
  }

  function toggleDone(id) {
    const w = workouts.find(x => x.id === id);
    if (w) { w.done = !w.done; saveWorkouts(); renderSchedule(); }
  }

  // ── Modal ──
  function openAddModal() {
    document.getElementById('modal-exercise').selectedIndex = 0;
    document.getElementById('modal-duration').value = 30;
    document.getElementById('modal-day').value = 0;
    document.getElementById('modal-duration-error').classList.remove('show');
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function confirmModal() {
    const dayIndex = parseInt(document.getElementById('modal-day').value);
    const name     = document.getElementById('modal-exercise').value;
    const rawVal   = document.getElementById('modal-duration').value;
    const duration = parseInt(rawVal);
    const errEl    = document.getElementById('modal-duration-error');

    if (rawVal === '' || isNaN(duration)) {
      errEl.textContent = 'Please enter a duration.';
      errEl.classList.add('show');
      return;
    }
    if (duration < 1) {
      errEl.textContent = 'Duration must be at least 1 minute.';
      errEl.classList.add('show');
      return;
    }
    if (duration > 300) {
      errEl.textContent = 'Duration cannot exceed 300 minutes.';
      errEl.classList.add('show');
      return;
    }

    errEl.classList.remove('show');
    workouts.push({
      id: Date.now().toString(),
      dayIndex, name, duration, done: false,
      addedDate: new Date().toISOString().split('T')[0]
    });
    saveWorkouts();
    closeModal();
    renderSchedule();
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Report ──
  function renderReport() {
    const done  = workouts.filter(w => w.done);
    const total = workouts.length;
    document.getElementById('report-stat').innerHTML =
      total === 0 ? '' : `<strong>${done.length} / ${total}</strong> workouts completed`;

    const listEl = document.getElementById('report-list');
    if (done.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No completed workouts yet. Mark some as done!</div>';
      return;
    }
    listEl.innerHTML = '';
    done.forEach(w => {
      const item = document.createElement('div');
      item.className = 'report-item';
      item.innerHTML = `
        <div class="report-day">${DAYS[w.dayIndex].slice(0,3)}</div>
        <div class="report-name">${w.name}</div>
        <div class="report-mins">${w.duration} min</div>
        <div class="done-badge">DONE</div>
      `;
      listEl.appendChild(item);
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Tracker - Iteration 2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 2rem 1rem; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    p.sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    h2 { font-size: 1rem; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 6px; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .card.done { background: #f0faf0; border-color: #b2dfb2; }
    .card span { font-size: 14px; }
    .card .status { font-size: 12px; color: #2e7d32; }
    button { padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
    button:hover { background: #f0f0f0; }
    #progress { font-size: 13px; color: #555; margin-bottom: 6px; }
    .progress-bar { background: #e0e0e0; border-radius: 4px; height: 6px; margin-bottom: 1rem; }
    .progress-fill { background: #2e7d32; height: 6px; border-radius: 4px; transition: width 0.3s; }
    .success-msg { background: #f0faf0; border: 1px solid #b2dfb2; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #2e7d32; margin-bottom: 1rem; display: none; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
    .summary-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 16px; text-align: center; }
    .summary-box .num { font-size: 1.6rem; font-weight: bold; color: #1a1a1a; }
    .summary-box .label { font-size: 11px; color: #888; margin-top: 4px; }
    .weight-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .weight-row input { flex: 1; padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { appearance: textfield; }    .history-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 16px; margin-bottom: 8px; font-size: 13px; color: #555; }
    .empty { font-size: 13px; color: #aaa; }
    .streak-badge { display: inline-block; background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; padding: 4px 10px; font-size: 13px; color: #f57f17; margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>Workout Tracker</h1>
  <p class="sub">Iteration 2 — track, report & weight log</p>

  <div id="streak-display"></div>

  <h2>Today's Workouts</h2>
  <div id="progress"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="success-msg" id="success-msg">🎉 Well done! All workouts completed today!</div>
  <div id="workout-list"></div>

  <h2>Weekly Summary</h2>
  <div class="summary-grid" id="summary"></div>

  <h2>Weight Log</h2>
  <div class="weight-row">
    <input type="number" id="weight-input" placeholder="Enter weight (kg)" step="0.1">
    <button onclick="logWeight()">Log</button>
  </div>
  <p class="error-msg" id="weight-error">Please enter a valid weight (must be greater than 0).</p>
  <div id="weight-log"></div>

  <h2>History</h2>
  <div id="history"></div>
</div>

<script>
  const workouts = ["Bench Press", "Pull-up", "Squat", "Plank"];
  function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' +
         String(d.getMonth() + 1).padStart(2, '0') + '-' +
         String(d.getDate()).padStart(2, '0');
}

const today = getToday();
const done = JSON.parse(localStorage.getItem(today) || '[]');

  function render() {
    const list = document.getElementById('workout-list');
    const fill = document.getElementById('progress-fill');
    const prog = document.getElementById('progress');
    const msg  = document.getElementById('success-msg');

    list.innerHTML = workouts.map((w, i) => `
      <div class="card ${done.includes(i) ? 'done' : ''}">
        <span>${w}</span>
        ${done.includes(i)
          ? '<span class="status">✓ Completed</span>'
          : `<button onclick="markDone(${i})">Mark done</button>`}
      </div>`).join('');

    const pct = Math.round(done.length / workouts.length * 100);
    fill.style.width = pct + '%';
    prog.textContent = done.length + ' / ' + workouts.length + ' completed';
    msg.style.display = done.length === workouts.length ? 'block' : 'none';
  }

  function markDone(i) {
    if (!done.includes(i)) done.push(i);
    localStorage.setItem(today, JSON.stringify(done));
    if (done.length === workouts.length) saveHistory();
    render();
    renderSummary();
    renderStreak();
  }

  function saveHistory() {
    const h = JSON.parse(localStorage.getItem('history') || '[]');
    if (!h.find(x => x.date === today)) {
      h.unshift({ date: today, count: workouts.length });
      localStorage.setItem('history', JSON.stringify(h));
    }
    renderHistory();
  }

  function renderHistory() {
    const h = JSON.parse(localStorage.getItem('history') || '[]');
    document.getElementById('history').innerHTML = h.length === 0
      ? '<p class="empty">No history yet.</p>'
      : h.map(x => `<div class="history-item">${x.date} — ${x.count} workouts completed</div>`).join('');
  }

function calcStreak() {
  const h = JSON.parse(localStorage.getItem('history') || '[]');

  if (h.length === 0) return 0;

  const dates = h
    .map(x => new Date(x.date))
    .sort((a, b) => b - a);

  let streak = 1;

  for (let i = 0; i < dates.length - 1; i++) {
    const diff =
      (dates[i] - dates[i + 1]) /
      (1000 * 60 * 60 * 24);

    if (Math.round(diff) === 1) {
      streak++;
    } else {
      break;
    }
  }

  return streak;
}
  

  function renderStreak() {
    const streak = calcStreak();
    const el = document.getElementById('streak-display');
    el.innerHTML = streak > 0
      ? `<div class="streak-badge">🔥 ${streak}-day streak! Keep it up!</div>`
      : '';
  }

  function renderSummary() {
    const h = JSON.parse(localStorage.getItem('history') || '[]');
    const total = h.reduce((sum, x) => sum + x.count, 0);
    const streak = calcStreak();
    document.getElementById('summary').innerHTML = `
      <div class="summary-box"><div class="num">${h.length}</div><div class="label">Sessions</div></div>
      <div class="summary-box"><div class="num">${total}</div><div class="label">Total workouts</div></div>
      <div class="summary-box"><div class="num">${streak}🔥</div><div class="label">Day streak</div></div>`;
  }

  function logWeight() {
    const val = parseFloat(document.getElementById('weight-input').value);
    const errEl = document.getElementById('weight-error');

    if (!val || val <= 0) {
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';
    const log = JSON.parse(localStorage.getItem('weight_log') || '[]');
    log.unshift({ date: today, weight: val });
    localStorage.setItem('weight_log', JSON.stringify(log));
    document.getElementById('weight-input').value = '';
    renderWeightLog();
  }

  function renderWeightLog() {
    const log = JSON.parse(localStorage.getItem('weight_log') || '[]');
    document.getElementById('weight-log').innerHTML = log.length === 0
      ? '<p class="empty">No weight logged yet.</p>'
      : log.map(x => `<div class="history-item">${x.date} — ${x.weight} kg</div>`).join('');
  }

  render();
  renderHistory();
  renderWeightLog();
  renderSummary();
  renderStreak();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Workout Tracker</title>
</head>
<body>
  <h1>Workout Tracker</h1>

  <ul id="list"></ul>
  <p id="progress"></p>

  <h2>History</h2>
  <div id="history"></div>

<script>
  const workouts = ["Bench Press", "Pull-up", "Squat", "Plank"];
  const today = new Date().toLocaleDateString();
  const done = JSON.parse(localStorage.getItem(today) || '[]');

  function render() {
    document.getElementById('list').innerHTML = workouts.map((w, i) => `
      <li>${w} ${done.includes(i)
        ? '✓'
        : `<button onclick="markDone(${i})">Done</button>`}
      </li>`).join('');
    document.getElementById('progress').textContent = done.length + ' / ' + workouts.length + ' completed';
  }

  function markDone(i) {
    if (!done.includes(i)) done.push(i);
    localStorage.setItem(today, JSON.stringify(done));
    if (done.length === workouts.length) saveHistory();
    render();
  }

  function saveHistory() {
    const h = JSON.parse(localStorage.getItem('history') || '[]');
    if (!h.find(x => x.date === today)) {
      h.unshift({ date: today, count: workouts.length });
      localStorage.setItem('history', JSON.stringify(h));
    }
    document.getElementById('history').innerHTML = h.map(x => `<p>${x.date} — ${x.count} workouts done</p>`).join('');
  }

  render();
  document.getElementById('history').innerHTML =
    JSON.parse(localStorage.getItem('history') || '[]')
    .map(x => `<p>${x.date} — ${x.count} workouts done</p>`).join('') || '<p>No history yet.</p>';
</script>
</body>
</html>

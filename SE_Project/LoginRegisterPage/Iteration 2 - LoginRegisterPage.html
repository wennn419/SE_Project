<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login & Register</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000000;
    }

    .container{
      width:380px;
      background:white;
      padding:35px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      margin-bottom:6px;
      color:#555;
      font-size:14px;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus{
      border-color:#4a4a4a;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#4d4d4d;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#8f8f8f;
    }

    .switch{
      text-align:center;
      margin-top:15px;
      font-size:14px;
    }

    .switch span{
      color:#000000;
      cursor:pointer;
      font-weight:bold;
    }

    #registerForm{
      display:none;
    }

    /* Iteration 2: Show/hide password */
    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      width: 100%;
      padding-right: 40px;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      font-size: 16px;
    }

    /* Iteration 2: Forget password */
    .forgot-link {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 18px;
      font-size: 13px;
    }
 
    .forgot-link span {
      color: #4d4d4d;
      cursor: pointer;
      text-decoration: underline;
    }
 
    .forgot-link span:hover {
      color: #000;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
 
    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: white;
      width: 360px;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      position: relative;
    }
 
    .modal-box h2 {
      margin-bottom: 8px;
    }
 
    .modal-box p {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      text-align: center;
    }
 
    .modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 20px;
      cursor: pointer;
      color: #888;
      line-height: 1;
    }
 
    .modal-close:hover {
      color: #000;
    }
 
    #resetStep {
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <div id="loginForm">

      <h2>Login</h2>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <!-- Iteration 2: Show/hide password -->
        <div class="password-wrapper">
          <input type="password" id="loginPassword" placeholder="Enter your password">
          <span class="toggle-password" onclick="togglePassword('loginPassword', this)">👁️</span>
        </div>
      </div>

      <!-- Iteration 2: Forgot password -->
      <div class="forgot-link">
        <span onclick="openForgotPassword()">Forgot Password?</span>
      </div>

      <button onclick="login()">Login</button>

      <div class="switch">
        Don't have an account?
        <span onclick="showRegister()">Register</span>
      </div>

    </div>

    <div id="registerForm">

      <h2>Register</h2>

      <div class="input-group">
        <label>Username</label>
        <input type="text" id="registerUsername" placeholder="Enter username">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="Enter email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <!-- Iteration 2: Show/hide password -->
        <div class="password-wrapper">
          <input type="password" id="registerPassword" placeholder="Enter your password">
          <span class="toggle-password" onclick="togglePassword('registerPassword', this)">👁️</span>
        </div>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <!-- Iteration 2: Show/hide password -->
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Enter your password">
          <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</span>
        </div>
      </div>

      <button onclick="register()">Register</button>

      <div class="switch">
        Already have an account?
        <span onclick="showLogin()">Login</span>
      </div>
    </div>
  </div>

  <!-- Iteration 2: Forget password -->
  <div class="modal-overlay" id="forgotModal">
    <div class="modal-box">
      <span class="modal-close" onclick="closeForgotPassword()">&#x2715;</span>

      <div id="emailStep">
        <h2>Forgot Password</h2>
        <p>Enter your registered email to reset your password.</p>
 
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="forgotEmail" placeholder="Enter your registered email">
        </div>
 
        <button onclick="verifyForgotEmail()">Continue</button>
      </div>

      <div id="resetStep">
        <h2>Reset Password</h2>
        <p>Enter and confirm your new password.</p>
 
        <div class="input-group">
          <label>New Password</label>
          <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="Enter your password">
            <span class="toggle-password" onclick="togglePassword('newPassword', this)">👁️</span>
          </div>
        </div>
 
        <div class="input-group">
          <label>Confirm New Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmNewPassword" placeholder="Enter your password">
            <span class="toggle-password" onclick="togglePassword('confirmNewPassword', this)">👁️</span>
          </div>
        </div>
 
        <button onclick="resetPassword()">Reset Password</button>
      </div>
    </div>
  </div>

  <script>
    // Show Register
    function showRegister(){
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "block";
    }

    // Show Login
    function showLogin(){
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
    }

    // Get all registered users from localStorage
    function getUsers(){
      let users = localStorage.getItem("users");
      return users ? JSON.parse(users) : [];
    }

    // Save all registered users to localStorage
    function saveUsers(users){
      localStorage.setItem("users", JSON.stringify(users));
    }

    // Register Function
    function register(){
      let username = document.getElementById("registerUsername").value.trim();
      let email = document.getElementById("registerEmail").value.trim();
      let password = document.getElementById("registerPassword").value;
      let confirm = document.getElementById("confirmPassword").value;

      // Check whether Username and Email are empty
      if(!username){
        alert("Username cannot be empty.");
        return;
      }
      if(!email){
        alert("Email cannot be empty.");
        return;
      }
      // Check whether the email format is correct
      let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRegex.test(email)){
        alert("Please enter a valid email address.");
        return;
      }
      if(!password){
        alert("Password cannot be empty.");
        return;
      }
      // Check whether the "Password" is same with "Confirm Password"
      if(password !== confirm){
        alert("Passwords do not match.");
        return;
      }

      // Iteration 2: Check for duplicate email
      let users = getUsers();
      let emailExists = users.some(u => u.email.toLowerCase() === email.toLowerCase());
      if(emailExists){
        alert("This email is already registered. Please use a different email.");
        return;
      }

      // Iteration 2: Check password strength
      let strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}$/;
      if(!strongPassword.test(password)){
        alert("Password must be at least 6 characters and include uppercase, lowercase, number and special character.");
        return;
      }

      // Save the new user into the users array
      users.push({ username, email, password });
      saveUsers(users);

      alert("Registration Successful!");

      document.getElementById("registerUsername").value = "";
      document.getElementById("registerEmail").value = "";
      document.getElementById("registerPassword").value = "";
      document.getElementById("confirmPassword").value = "";

      setTimeout(() => {
        showLogin();
      }, 1000);
    }

    // Login Function
    function login(){
      let email = document.getElementById("loginEmail").value.trim();
      let password = document.getElementById("loginPassword").value;

      // Check whether Email and Password are empty
      if(!email){
        alert("Email cannot be empty.");
        return;
      }
      if(!password){
        alert("Password cannot be empty.");
        return;
      }

      // Check admin credentials
      let isAdmin = (email === "admin@gmail.com" && password === "admin123");

      // Check registered users
      let users   = getUsers();
      let matched = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);

      if(!isAdmin && !matched){
        alert("Incorrect email or password.");
        return;
      }

      let currentUser = isAdmin ? "Admin" : matched.username;

      alert("Login Successful!");
    }

    // Iteration 2: Show/hide password
    function togglePassword(inputId, icon){
      let input = document.getElementById(inputId);
      if(input.type === "password"){
        input.type = "text";
        icon.textContent = "🙈";
      } else {
        input.type = "password";
        icon.textContent = "👁️";
      }
    }

    // Iteration 2: Forget password
    function openForgotPassword(){
      document.getElementById("forgotEmail").value = "";
      document.getElementById("newPassword").value = "";
      document.getElementById("confirmNewPassword").value = "";
      document.getElementById("emailStep").style.display = "block";
      document.getElementById("resetStep").style.display = "none";
      document.getElementById("forgotModal").classList.add("active");
    }

    function closeForgotPassword(){
      document.getElementById("forgotModal").classList.remove("active");
    }
 
    // Verify if email is registered
    function verifyForgotEmail(){
      let email = document.getElementById("forgotEmail").value.trim();
 
      if(!email){
        alert("Please enter your email.");
        return;
      }
 
      let users = getUsers();
      let exists = users.some(u => u.email.toLowerCase() === email.toLowerCase());
 
      // Admin cannot reset password
      if(email.toLowerCase() === "admin@gmail.com"){
        alert("Admin password cannot be reset.");
        return;
      }

      document.getElementById("emailStep").style.display = "none";
      document.getElementById("resetStep").style.display = "block";
    }
 
    // Reset the password
    function resetPassword(){
      let email = document.getElementById("forgotEmail").value.trim();
      let newPass = document.getElementById("newPassword").value;
      let confirmPass = document.getElementById("confirmNewPassword").value;
 
      if(!newPass){
        alert("New password cannot be empty.");
        return;
      }
 
      // Check new password strength
      let strongPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}$/;
      if(!strongPassword.test(newPass)){
        alert("Password must be at least 6 characters and include uppercase, lowercase, number and special character.");
        return;
      }

      // Check whether new password is same as old password or not
      let users = getUsers();
      let userIndex = users.findIndex(u => u.email.toLowerCase() === email.toLowerCase());
      if(userIndex !== -1 && users[userIndex].password === newPass){
        alert("New password cannot be the same as your current password.");
        return;
      }
 
      if(newPass !== confirmPass){
        alert("Passwords do not match.");
        return;
      }
 
      // Update password in localStorage
      if(userIndex !== -1){
        users[userIndex].password = newPass;
        saveUsers(users);
      }
      // (Admin password is hardcoded, so we skip saving for admin)
 
      alert("Password has been reset successfully!");
      closeForgotPassword();
    }
 
  </script>

</body>
</html>

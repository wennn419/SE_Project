<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This Week Workout Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f9f9f9;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: #1a1a1a;
  }

  header p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .day-card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    overflow: hidden;
  }

  .day-header {
    padding: 10px 14px;
    border-bottom: 1px solid #e5e5e5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fafafa;
  }

  .day-card.today .day-header {
    background: #1a1a1a;
  }

  .day-card.today .day-name,
  .day-card.today .day-date {
    color: #fff;
  }

  .day-card.today .add-btn {
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }

  .day-card.today .add-btn:hover {
    background: rgba(255,255,255,0.15);
  }

  .day-name {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .day-date {
    font-size: 11px;
    color: #999;
    margin-top: 1px;
  }

  .add-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid #d0d0d0;
    background: transparent;
    color: #555;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .add-btn:hover {
    background: #f0f0f0;
  }

  .workout-list {
    padding: 8px 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-height: 48px;
  }

  .empty-hint {
    font-size: 11px;
    color: #bbb;
    padding: 4px 2px;
  }

  .workout-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: 5px;
    background: #f5f5f5;
    border: 1px solid #ebebeb;
  }

  .workout-name {
    font-size: 12px;
    font-weight: 500;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .workout-duration {
    font-size: 11px;
    color: #999;
    margin-left: 8px;
    white-space: nowrap;
  }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    width: 100%;
    max-width: 380px;
    overflow: hidden;
  }

  .modal-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .modal-subtitle {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }

  .modal-close {
    background: none;
    border: 1px solid #e0e0e0;
    border-radius: 5px;
    cursor: pointer;
    color: #999;
    font-size: 14px;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-close:hover { background: #f5f5f5; }

  .modal-body {
    padding: 14px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .exercise-select, .duration-input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #fff;
    outline: none;
  }

  .exercise-select:focus, .duration-input:focus {
    border-color: #1a1a1a;
  }

  .duration-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .duration-input {
    width: 80px;
  }

  .duration-unit {
    font-size: 13px;
    color: #999;
  }

  .modal-footer {
    padding: 0 18px 16px;
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 9px 14px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #e0e0e0;
    transition: background 0.15s;
  }

  .btn-primary {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #fff;
  }

  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .btn-secondary { background: transparent; color: #555; }
  .btn-secondary:hover { background: #f5f5f5; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>This Week's Workout Plan</h1>
    <p id="week-label"></p>
  </header>

  <div class="grid" id="week-grid"></div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <div>
        <div class="modal-title">Add Workout</div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Exercise</label>
        <select class="exercise-select" id="exercise-select">
          <optgroup label="Strength">
            <option>Bench Press</option>
            <option>Deadlift</option>
            <option>Squats</option>
            <option>Pull-ups</option>
            <option>Shoulder Press</option>
            <option>Dumbbell Row</option>
          </optgroup>
          <optgroup label="Cardio">
            <option>Running</option>
            <option>Cycling</option>
            <option>Swimming</option>
            <option>Jump Rope</option>
            <option>Elliptical</option>
            <option>Rowing</option>
          </optgroup>
          <optgroup label="HIIT">
            <option>Burpees</option>
            <option>Box Jumps</option>
            <option>Kettlebell</option>
            <option>Battle Ropes</option>
            <option>Mountain Climbers</option>
            <option>Sprint Intervals</option>
          </optgroup>
          <optgroup label="Yoga & Stretch">
            <option>Vinyasa Flow</option>
            <option>Yin Yoga</option>
            <option>Power Yoga</option>
            <option>Stretching</option>
            <option>Meditation</option>
            <option>Pilates</option>
          </optgroup>
          <optgroup label="Sports & Other">
            <option>Basketball</option>
            <option>Football</option>
            <option>Tennis</option>
            <option>Hiking</option>
            <option>Dance</option>
            <option>Boxing</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label>Duration</label>
        <div class="duration-row">
          <input type="number" class="duration-input" id="duration-input" min="1" max="300" value="30">
          <span class="duration-unit">minutes</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-add">Add</button>
    </div>
  </div>
</div>

<script>
let workouts = {};
let modalDay = null;

function getWeekDates() {
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow + 6) % 7));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function formatDate(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function isToday(d) {
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

function renderWorkoutItem(w) {
  const div = document.createElement('div');
  div.className = 'workout-item';
  div.innerHTML = `
    <span class="workout-name">${w.name}</span>
    <span class="workout-duration">${w.duration} min</span>
  `;
  return div;
}

function renderGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  const dates = getWeekDates();
  const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  dates.forEach((date, i) => {
    const dayName = DAY_NAMES[i];
    const dayKey = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday(date) ? ' today' : '');

    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML = `
      <div>
        <div class="day-name">${dayName}</div>
        <div class="day-date">${formatDate(date)}${isToday(date) ? ' · Today' : ''}</div>
      </div>
      <button class="add-btn" aria-label="Add workout">+</button>
    `;
    header.querySelector('.add-btn').addEventListener('click', () => openModal(dayKey, dayName, date));

    const list = document.createElement('div');
    list.className = 'workout-list';

    const dayWorkouts = workouts[dayKey] || [];
    if (dayWorkouts.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = 'No workouts yet';
      list.appendChild(hint);
    } else {
      dayWorkouts.forEach(w => list.appendChild(renderWorkoutItem(w)));
    }

    card.appendChild(header);
    card.appendChild(list);
    grid.appendChild(card);
  });
}

function openModal(dayKey, dayName, date) {
  modalDay = dayKey;
  document.getElementById('modal-subtitle').textContent = `${dayName}, ${formatDate(date)}`;
  document.getElementById('duration-input').value = 30;
  document.getElementById('exercise-select').selectedIndex = 0;
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
}

document.getElementById('modal-add').addEventListener('click', () => {
  const name = document.getElementById('exercise-select').value;
  const duration = parseInt(document.getElementById('duration-input').value) || 30;
  if (!workouts[modalDay]) workouts[modalDay] = [];
  workouts[modalDay].push({ name, duration });
  closeModal();
  renderGrid();
});

function validateDuration() {
  const input = document.getElementById('duration-input');
  const hint = document.getElementById('duration-hint');
  const val = parseInt(input.value);
  if (input.value === '' || isNaN(val)) {
    hint.textContent = 'Please enter a duration.';
    return false;
  } else if (val < 1) {
    hint.textContent = 'Minimum duration is 1 minute.';
    return false;
  } else if (val > 120) {
    hint.textContent = 'Maximum duration is 120 minutes.';
    return false;
  }
  hint.textContent = '';
  return true;
}
 
document.getElementById('duration-input').addEventListener('input', validateDuration);

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

(function init() {
  const dates = getWeekDates();
  document.getElementById('week-label').textContent =
    `${formatDate(dates[0])} – ${formatDate(dates[6])}`;
  renderGrid();
})();
</script>
</body>
</html>

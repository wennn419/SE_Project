<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This Week Workout Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f4;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --text: #111111;
    --text-muted: #888888;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.20);
    --pill-radius: 999px;
    --card-radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  /* ── Header ── */
  header {
    padding: 2.5rem 2rem 1.5rem;
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border-strong);
    margin-bottom: 1.5rem;
  }

  .header-left h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #111;
  }

  .header-left h1 em {
    font-style: italic;
    color: #111;
  }

  .week-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 5px;
  }

  .week-stats {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat { text-align: right; }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    line-height: 1;
    color: #111;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .stat-divider {
    width: 1px;
    height: 36px;
    background: var(--border-strong);
  }

  /* ── Progress ── */
  .progress-bar-wrap {
    max-width: 960px;
    margin: 0 auto 1.5rem;
    padding: 0 2rem;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .progress-bar-bg {
    height: 4px;
    background: #ddd;
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: #111;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* ── Grid ── */
  .grid {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  /* ── Day Card ── */
  .day-card {
    background: var(--surface);
    border-radius: var(--card-radius);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .day-card.today .day-header {
    background: #111;
  }

  .day-card.today .day-name,
  .day-card.today .day-date {
    color: #fff;
  }

  .day-card.today .add-btn {
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }

  .day-card.today .add-btn:hover {
    background: rgba(255,255,255,0.12);
  }

  .day-header {
    padding: 12px 14px 10px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .day-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: #111;
    line-height: 1.1;
  }

  .day-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .add-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: transparent;
    color: #111;
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .add-btn:hover { background: #e8e8e8; }

  /* ── Workout List ── */
  .workout-list {
    padding: 8px 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-height: 50px;
  }

  .empty-hint {
    font-size: 12px;
    color: #ccc;
    padding: 6px 2px;
    font-style: italic;
  }

  /* ── Workout Item ── */
  .workout-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 9px;
    border-radius: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    animation: slideIn 0.18s ease;
    transition: opacity 0.2s, background 0.2s;
  }

  .workout-item.done {
    opacity: 0.42;
    background: #e8e8e8;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .workout-icon {
    font-size: 17px;
    flex-shrink: 0;
    line-height: 1;
  }

  .workout-info {
    flex: 1;
    min-width: 0;
  }

  .workout-name {
    font-size: 12.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #111;
    transition: text-decoration 0.15s, color 0.15s;
  }

  .workout-item.done .workout-name {
    text-decoration: line-through;
    color: #999;
  }

  .workout-duration {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .workout-item.done .workout-duration {
    color: #bbb;
  }

  .workout-cat {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: var(--pill-radius);
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
    border: 1px solid #ddd;
    color: #666;
    background: #fff;
  }

  .workout-item.done .workout-cat {
    color: #bbb;
    border-color: #e0e0e0;
  }

  /* ── Item Actions ── */
  .item-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .workout-item:hover .item-actions { opacity: 1; }

  .check-btn, .edit-btn, .remove-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    color: var(--text-muted);
    transition: background 0.12s, color 0.12s;
  }

  .check-btn:hover  { background: #e8f5e9; color: #2e7d32; }
  .edit-btn:hover   { background: #f0f0f0; color: #111; }
  .remove-btn:hover { background: #fdecea; color: #c62828; }

  .workout-item.done .check-btn { color: #2e7d32; opacity: 1; }

  /* ── Modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #ddd;
    width: 100%;
    max-width: 400px;
    overflow: hidden;
    animation: modalIn 0.18s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid #ebebeb;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    font-weight: 400;
    color: #111;
  }

  .modal-subtitle {
    font-size: 12px;
    color: #999;
    margin-top: 3px;
  }

  .modal-close {
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    color: #999;
    font-size: 15px;
    width: 27px;
    height: 27px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 12px;
    flex-shrink: 0;
  }

  .modal-close:hover { background: #f5f5f5; }

  .modal-body {
    padding: 16px 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 7px;
  }

  /* Category tabs */
  .category-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .cat-tab {
    padding: 4px 12px;
    border-radius: var(--pill-radius);
    border: 1px solid #ddd;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    color: #555;
    transition: all 0.12s;
  }

  .cat-tab:hover { border-color: #111; color: #111; }

  .cat-tab.active {
    background: #111;
    border-color: #111;
    color: #fff;
  }

  /* Exercise grid */
  .exercise-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    max-height: 190px;
    overflow-y: auto;
    scrollbar-width: thin;
  }

  .exercise-option {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #e5e5e5;
    background: #f9f9f9;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: #333;
    transition: all 0.12s;
  }

  .exercise-option:hover {
    border-color: #111;
    background: #f0f0f0;
  }

  .exercise-option.selected {
    border-color: #111;
    background: #111;
    color: #fff;
    box-shadow: inset 0 0 0 1px #111;
  }

  /* Custom input */
  .custom-input {
    width: 100%;
    padding: 8px 11px;
    border-radius: 7px;
    border: 1px solid #ddd;
    background: #f9f9f9;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #111;
    outline: none;
    transition: border-color 0.15s;
  }

  .custom-input:focus { border-color: #111; background: #fff; }

  /* Duration */
  .duration-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .duration-input {
    width: 80px;
    padding: 8px 10px;
    border-radius: 7px;
    border: 1px solid #ddd;
    background: #f9f9f9;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #111;
    outline: none;
    transition: border-color 0.15s;
  }

  .duration-input:focus { border-color: #111; background: #fff; }
  .duration-input.error { border-color: #c62828; }

  .duration-unit { font-size: 13px; color: #999; }

  .duration-hint {
    font-size: 11px;
    color: #c62828;
    margin-top: 4px;
    min-height: 14px;
  }

  /* Footer */
  .modal-footer {
    padding: 0 20px 18px;
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 10px 16px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid #ddd;
    transition: background 0.12s;
  }

  .btn-primary { background: #111; border-color: #111; color: #fff; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }
  .btn-secondary { background: transparent; color: #555; }
  .btn-secondary:hover { background: #f5f5f5; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>This Week's <em>Workout Plan</em></h1>
    <p class="week-label" id="week-label"></p>
  </div>
  <div class="week-stats">
    <div class="stat">
      <div class="stat-num" id="total-sessions">0</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="total-mins">0</div>
      <div class="stat-label">Minutes</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="total-done">0</div>
      <div class="stat-label">Done</div>
    </div>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-label">
    <span id="progress-text">Weekly goal progress</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="grid" id="week-grid"></div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Add Workout</div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Category</label>
        <div class="category-tabs" id="cat-tabs"></div>
      </div>
      <div class="field">
        <label>Exercise</label>
        <div class="exercise-grid" id="exercise-grid"></div>
      </div>
      <div class="field">
        <label>Custom name (optional)</label>
        <input type="text" class="custom-input" id="custom-name" placeholder="e.g. Jump rope, Cycling…">
      </div>
      <div class="field">
        <label>Duration</label>
        <div class="duration-row">
          <input type="number" class="duration-input" id="duration-input" min="1" max="120" value="30">
          <span class="duration-unit">minutes (1–120)</span>
        </div>
        <div class="duration-hint" id="duration-hint"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-add" disabled>Add Workout</button>
    </div>
  </div>
</div>

<script>
const CAT_LABELS = { strength:'Strength', cardio:'Cardio', hiit:'HIIT', yoga:'Yoga & Stretch', other:'Sports & Other' };

const EXERCISES = {
  strength: [
    { name: 'Bench Press',    icon: '🏋️' },
    { name: 'Deadlift',       icon: '💪' },
    { name: 'Squats',         icon: '🦵' },
    { name: 'Pull-ups',       icon: '🙌' },
    { name: 'Shoulder Press', icon: '🔝' },
    { name: 'Dumbbell Row',   icon: '🧎‍➡️' },
  ],
  cardio: [
    { name: 'Running',    icon: '🏃' },
    { name: 'Cycling',    icon: '🚴' },
    { name: 'Swimming',   icon: '🏊' },
    { name: 'Jump Rope',  icon: '🙂‍↕' },
    { name: 'Elliptical', icon: '🔄' },
    { name: 'Rowing',     icon: '🚣' },
  ],
  hiit: [
    { name: 'Burpees',           icon: '❤️‍🔥' },
    { name: 'Box Jumps',         icon: '📦' },
    { name: 'Kettlebell',        icon: '🔔' },
    { name: 'Battle Ropes',      icon: '🪢' },
    { name: 'Mountain Climbers', icon: '⛰️' },
    { name: 'Sprint Intervals',  icon: '⚡' },
  ],
  yoga: [
    { name: 'Vinyasa Flow', icon: '🧘' },
    { name: 'Yin Yoga',     icon: '☯️' },
    { name: 'Power Yoga',   icon: '✨' },
    { name: 'Stretching',   icon: '🤸' },
    { name: 'Meditation',   icon: '🌿' },
    { name: 'Pilates',      icon: '🩰' },
  ],
  other: [
    { name: 'Basketball', icon: '🏀' },
    { name: 'Football',   icon: '⚽' },
    { name: 'Tennis',     icon: '🎾' },
    { name: 'Hiking',     icon: '🥾' },
    { name: 'Dance',      icon: '💃' },
    { name: 'Boxing',     icon: '🥊' },
  ],
};

const WEEK_GOAL = 5;

let workouts = {};       // { dayKey: [{name, duration, cat, done}] }
let modalDay  = null;
let editIdx   = null;
let selectedExercise = null;
let selectedCat = 'strength';

/* ── Date helpers ── */
function getWeekDates() {
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function isToday(d) {
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

function dayKey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

/* ── Stats ── */
function updateStats() {
  let sessions = 0, mins = 0, done = 0;
  Object.values(workouts).forEach(list => {
    sessions += list.length;
    list.forEach(w => { mins += w.duration; if (w.done) done++; });
  });
  document.getElementById('total-sessions').textContent = sessions;
  document.getElementById('total-mins').textContent = mins;
  document.getElementById('total-done').textContent = done;
  const pct = Math.min(100, Math.round((done / Math.max(sessions, 1)) * 100));
  document.getElementById('progress-fill').style.width = (sessions ? pct : 0) + '%';
  document.getElementById('progress-pct').textContent = sessions ? pct + '%' : '0%';
  document.getElementById('progress-text').textContent = `${done} of ${sessions} workout${sessions !== 1 ? 's' : ''} completed`;
}

/* ── Render workout item ── */
function renderWorkoutItem(dk, idx, w) {
  const div = document.createElement('div');
  div.className = 'workout-item' + (w.done ? ' done' : '');
  div.innerHTML = `
    <span class="workout-icon">${w.icon || '🏃'}</span>
    <div class="workout-info">
      <div class="workout-name">${w.name}</div>
      <div class="workout-duration">${w.duration} min</div>
    </div>
    <span class="workout-cat">${CAT_LABELS[w.cat] ? CAT_LABELS[w.cat].split(' ')[0] : w.cat}</span>
    <div class="item-actions">
      <button class="check-btn" title="${w.done ? 'Mark incomplete' : 'Mark complete'}" data-day="${dk}" data-idx="${idx}">${w.done ? '✓' : '○'}</button>
      <button class="edit-btn"  title="Edit"   data-day="${dk}" data-idx="${idx}">✏</button>
      <button class="remove-btn" title="Remove" data-day="${dk}" data-idx="${idx}">✕</button>
    </div>
  `;
  div.querySelector('.check-btn').addEventListener('click', e => {
    const d = e.currentTarget.dataset.day, i = +e.currentTarget.dataset.idx;
    workouts[d][i].done = !workouts[d][i].done;
    renderGrid(); updateStats();
  });
  div.querySelector('.edit-btn').addEventListener('click', e => {
    openEditModal(e.currentTarget.dataset.day, +e.currentTarget.dataset.idx);
  });
  div.querySelector('.remove-btn').addEventListener('click', e => {
    const d = e.currentTarget.dataset.day, i = +e.currentTarget.dataset.idx;
    workouts[d].splice(i, 1);
    renderGrid(); updateStats();
  });
  return div;
}

/* ── Render full grid ── */
function renderGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  getWeekDates().forEach((date, i) => {
    const dk = dayKey(date);
    const card = document.createElement('div');
    card.className = 'day-card' + (isToday(date) ? ' today' : '');

    const hdr = document.createElement('div');
    hdr.className = 'day-header';
    hdr.innerHTML = `
      <div>
        <div class="day-name">${DAY_NAMES[i]}</div>
        <div class="day-date">${fmtDate(date)}${isToday(date) ? ' · Today' : ''}</div>
      </div>
      <button class="add-btn" aria-label="Add workout">+</button>
    `;
    hdr.querySelector('.add-btn').addEventListener('click', () => openModal(dk, DAY_NAMES[i], date));

    const list = document.createElement('div');
    list.className = 'workout-list';
    const day = workouts[dk] || [];
    if (!day.length) {
      const h = document.createElement('div');
      h.className = 'empty-hint';
      h.textContent = 'No workouts yet';
      list.appendChild(h);
    } else {
      day.forEach((w, idx) => list.appendChild(renderWorkoutItem(dk, idx, w)));
    }

    card.appendChild(hdr);
    card.appendChild(list);
    grid.appendChild(card);
  });
}

/* ── Duration validation ── */
function validateDuration() {
  const input = document.getElementById('duration-input');
  const hint  = document.getElementById('duration-hint');
  const val   = parseInt(input.value);
  input.classList.remove('error');
  if (input.value === '' || isNaN(val)) {
    hint.textContent = 'Please enter a duration.';
    input.classList.add('error');
    return false;
  }
  if (val < 1) {
    hint.textContent = 'Minimum is 1 minute.';
    input.classList.add('error');
    return false;
  }
  if (val > 120) {
    hint.textContent = 'Maximum is 120 minutes.';
    input.classList.add('error');
    return false;
  }
  hint.textContent = '';
  return true;
}

document.getElementById('duration-input').addEventListener('input', () => {
  validateDuration();
  checkAdd();
});

/* ── Modal helpers ── */
function checkAdd() {
  const hasExercise = selectedExercise || document.getElementById('custom-name').value.trim();
  const durOk = validateDuration();
  document.getElementById('modal-add').disabled = !(hasExercise && durOk);
}

function renderCatTabs() {
  const wrap = document.getElementById('cat-tabs');
  wrap.innerHTML = '';
  Object.keys(CAT_LABELS).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat === selectedCat ? ' active' : '');
    btn.textContent = CAT_LABELS[cat];
    btn.addEventListener('click', () => {
      selectedCat = cat; selectedExercise = null;
      renderCatTabs(); renderExercises(); checkAdd();
    });
    wrap.appendChild(btn);
  });
}

function renderExercises() {
  const g = document.getElementById('exercise-grid');
  g.innerHTML = '';
  EXERCISES[selectedCat].forEach(ex => {
    const opt = document.createElement('div');
    opt.className = 'exercise-option' + (selectedExercise && selectedExercise.name === ex.name ? ' selected' : '');
    opt.innerHTML = `<span style="font-size:15px;margin-right:6px;line-height:1">${ex.icon}</span>${ex.name}`;
    opt.addEventListener('click', () => {
      selectedExercise = ex;
      document.getElementById('custom-name').value = '';
      renderExercises(); checkAdd();
    });
    g.appendChild(opt);
  });
}

document.getElementById('custom-name').addEventListener('input', () => {
  if (document.getElementById('custom-name').value.trim()) selectedExercise = null;
  renderExercises(); checkAdd();
});

/* ── Open / close modal ── */
function openModal(dk, dayName, date) {
  modalDay = dk; editIdx = null;
  selectedExercise = null; selectedCat = 'strength';
  document.getElementById('modal-title').textContent = 'Add Workout';
  document.getElementById('modal-subtitle').textContent = `${dayName}, ${fmtDate(date)}`;
  document.getElementById('custom-name').value = '';
  document.getElementById('duration-input').value = 30;
  document.getElementById('duration-input').classList.remove('error');
  document.getElementById('duration-hint').textContent = '';
  document.getElementById('modal-add').textContent = 'Add Workout';
  document.getElementById('modal-add').disabled = true;
  renderCatTabs(); renderExercises();
  document.getElementById('modal-backdrop').classList.add('open');
}

function openEditModal(dk, idx) {
  const w = workouts[dk][idx];
  modalDay = dk; editIdx = idx;
  selectedCat = w.cat || 'strength';
  selectedExercise = { name: w.name, icon: w.icon || '🏃' };
  const dates = getWeekDates();
  const dateObj = dates.find(d => dayKey(d) === dk);
  const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayName = dateObj ? DAY_NAMES[dates.indexOf(dateObj)] : '';
  document.getElementById('modal-title').textContent = 'Edit Workout';
  document.getElementById('modal-subtitle').textContent = dateObj ? `${dayName}, ${fmtDate(dateObj)}` : '';
  document.getElementById('custom-name').value = '';
  document.getElementById('duration-input').value = w.duration;
  document.getElementById('duration-input').classList.remove('error');
  document.getElementById('duration-hint').textContent = '';
  document.getElementById('modal-add').textContent = 'Save Changes';
  document.getElementById('modal-add').disabled = false;
  renderCatTabs(); renderExercises();
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  editIdx = null;
}

/* ── Save workout ── */
document.getElementById('modal-add').addEventListener('click', () => {
  if (!validateDuration()) return;
  const customVal = document.getElementById('custom-name').value.trim();
  const name = customVal || selectedExercise.name;
  const icon = customVal ? '🏆' : (selectedExercise.icon || '🏃');
  const duration = parseInt(document.getElementById('duration-input').value);
  const entry = { name, icon, duration, cat: selectedCat, done: false };
  if (!workouts[modalDay]) workouts[modalDay] = [];
  if (editIdx !== null) {
    entry.done = workouts[modalDay][editIdx].done;
    workouts[modalDay][editIdx] = entry;
  } else {
    workouts[modalDay].push(entry);
  }
  closeModal(); renderGrid(); updateStats();
});

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

/* ── Init ── */
(function init() {
  const dates = getWeekDates();
  document.getElementById('week-label').textContent = `${fmtDate(dates[0])} – ${fmtDate(dates[6])}`;
  renderGrid(); updateStats();
})();
</script>
</body>
</html>

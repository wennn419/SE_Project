<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f4;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --text: #111111;
    --text-muted: #888888;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.20);
    --card-radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 2rem 4rem;
  }

  .page { max-width: 1000px; margin: 0 auto; }

  /* ── Header ── */
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .calendar-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
  }

  .cal-nav { display: flex; align-items: center; gap: 10px; }

  .cal-nav-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    font-size: 18px;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .cal-nav-btn:hover { background: var(--surface2); }

  .cal-month-label {
    font-size: 15px;
    font-weight: 600;
    min-width: 140px;
    text-align: center;
  }

  /* ── Legend ── */
  .cal-legend {
    display: flex;
    gap: 18px;
    margin-bottom: 16px;
    align-items: center;
  }

  .cal-legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .cal-legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  .cal-legend-dot.scheduled { background: #d1e8ff; border: 1.5px solid #5aaaff; }
  .cal-legend-dot.completed { background: #d4edda; border: 1.5px solid #5cb85c; }
  .cal-legend-dot.today-dot { background: #111; border-radius: 50%; }

  /* ── Toolbar row: view toggle + filters ── */
  .cal-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .view-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .view-toggle-btn {
    border: none;
    background: transparent;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }

  .view-toggle-btn.active {
    background: #111;
    color: #fff;
  }

  .view-toggle-btn:not(.active):hover { background: #e6e6e6; }

  .cal-filter-dropdown {
    position: relative;
  }

  .cal-filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s;
  }

  .cal-filter-btn:hover { background: var(--surface2); }
  .cal-filter-btn.open { background: var(--surface2); }

  .cal-filter-count {
    font-size: 10.5px;
    font-weight: 600;
    color: #fff;
    background: #111;
    border-radius: 999px;
    padding: 1px 7px;
    min-width: 16px;
    text-align: center;
  }

  .cal-filter-caret {
    font-size: 9px;
    color: var(--text-muted);
    transition: transform 0.12s;
  }
  .cal-filter-btn.open .cal-filter-caret { transform: rotate(180deg); }

  .cal-filter-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 220px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 6px;
    z-index: 20;
    max-height: 280px;
    overflow-y: auto;
  }

  .cal-filter-menu.open { display: block; }

  .cal-filter-menu-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    padding: 8px 10px 4px;
  }

  .cal-filter-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    transition: background 0.1s;
  }

  .cal-filter-item:hover { background: var(--surface2); }

  .cal-filter-item.selected {
    background: #111;
    color: #fff;
  }
  .cal-filter-item.selected .cal-filter-item-count { color: rgba(255,255,255,0.7); }

  .cal-filter-item-name { display: flex; align-items: center; gap: 8px; }

  .cal-filter-item-count {
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .cal-filter-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 2px;
  }

  /* ── Calendar Grid ── */
  .calendar-grid-wrap {
    background: var(--surface);
    border-radius: var(--card-radius);
    border: 1px solid var(--border-strong);
    overflow: hidden;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--surface2);
    border-bottom: 1px solid var(--border-strong);
  }

  .cal-weekday {
    padding: 12px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
  }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-day {
    min-height: 100px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 10px 8px 8px;
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }

  .cal-day:hover { background: #fafafa; }
  .cal-day:nth-child(7n) { border-right: none; }

  .cal-day.other-month { background: #fafafa; opacity: 0.5; cursor: default; }
  .cal-day.other-month:hover { background: #fafafa; }

  .cal-day.today { background: #f5f5f5; }

  /* Highlight days where every workout is completed */
  .cal-day.all-done {
    background: #f2faf3;
    box-shadow: inset 3px 0 0 #5cb85c;
  }
  .cal-day.all-done:hover { background: #eaf7ec; }
  .cal-day.today.all-done { background: #eef7ef; }

  .cal-day-done-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 11px;
    color: #1d6b2e;
  }

  .cal-day.no-match .cal-day-num { opacity: 0.35; }

  .cal-day-num {
    font-size: 13px;
    font-weight: 500;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    margin-bottom: 5px;
    color: var(--text);
  }

  .cal-day.today .cal-day-num {
    background: #111;
    color: #fff;
    font-weight: 700;
  }

  /* ── Workout Dots ── */
  .cal-day-workouts {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .cal-workout-pill {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 999px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .cal-workout-pill.scheduled {
    background: #d1e8ff;
    color: #0068cc;
    border: 1px solid #5aaaff;
  }

  .cal-workout-pill.completed {
    background: #d4edda;
    color: #1d6b2e;
    border: 1px solid #5cb85c;
  }

  .cal-more {
    font-size: 10px;
    color: var(--text-muted);
    padding: 1px 4px;
  }

  /* ── Week View ── */
  .cal-week-wrap {
    display: none;
    background: var(--surface);
    border-radius: var(--card-radius);
    border: 1px solid var(--border-strong);
    overflow: hidden;
  }

  .cal-week-wrap.active { display: grid; grid-template-columns: repeat(7, 1fr); }

  .cal-week-col {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 320px;
  }
  .cal-week-col:last-child { border-right: none; }

  .cal-week-col-head {
    padding: 10px 10px 8px;
    text-align: center;
    background: var(--surface2);
    border-bottom: 1px solid var(--border-strong);
  }

  .cal-week-col.today .cal-week-col-head { background: #eaeaea; }
  .cal-week-col.all-done .cal-week-col-head { box-shadow: inset 0 -3px 0 #5cb85c; }

  .cal-week-dow {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }

  .cal-week-daynum {
    font-size: 15px;
    font-weight: 600;
    width: 28px; height: 28px;
    margin: 4px auto 0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .cal-week-col.today .cal-week-daynum { background: #111; color: #fff; }

  .cal-week-col-body {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    cursor: pointer;
  }

  .cal-week-col-body:hover { background: #fafafa; }

  .cal-week-workout {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 8px;
    border-radius: 8px;
  }

  .cal-week-workout.scheduled { background: #d1e8ff; color: #0068cc; border: 1px solid #5aaaff; }
  .cal-week-workout.completed { background: #d4edda; color: #1d6b2e; border: 1px solid #5cb85c; }

  .cal-week-empty {
    font-size: 11px;
    color: #ccc;
    font-style: italic;
    padding: 4px 2px;
  }

  /* ── Modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #ddd;
    width: 100%;
    max-width: 380px;
    overflow: hidden;
    animation: modalIn 0.16s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid #ebebeb;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: #111;
  }

  .modal-subtitle {
    font-size: 12px;
    color: #999;
    margin-top: 3px;
  }

  .modal-close {
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    color: #999;
    font-size: 14px;
    width: 27px; height: 27px;
    display: flex; align-items: center; justify-content: center;
    margin-left: 12px;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  .modal-close:hover { background: #f5f5f5; }

  .modal-body {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 60vh;
    overflow-y: auto;
  }

  .modal-empty {
    font-size: 13px;
    color: #bbb;
    font-style: italic;
    padding: 8px 0;
  }

  /* ── Workout Row in modal ── */
  .modal-workout-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .modal-workout-icon { font-size: 18px; flex-shrink: 0; }

  .modal-workout-info { flex: 1; min-width: 0; }

  .modal-workout-name {
    font-size: 13px;
    font-weight: 500;
    color: #111;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .modal-workout-duration {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .modal-workout-status {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 999px;
    flex-shrink: 0;
  }

  .modal-workout-status.completed {
    background: #d4edda;
    color: #1d6b2e;
    border: 1px solid #5cb85c;
  }

  .modal-workout-status.scheduled {
    background: #d1e8ff;
    color: #0068cc;
    border: 1px solid #5aaaff;
  }
</style>
</head>
<body>

<div class="page">

  <div class="calendar-header">
    <h2>Workout Calendar</h2>
    <div class="cal-nav">
      <button class="cal-nav-btn" id="prev-month">&#8249;</button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav-btn" id="next-month">&#8250;</button>
    </div>
  </div>

  <div class="cal-legend">
    <div class="cal-legend-item">
      <div class="cal-legend-dot scheduled"></div> Scheduled
    </div>
    <div class="cal-legend-item">
      <div class="cal-legend-dot completed"></div> Completed
    </div>
    <div class="cal-legend-item">
      <div class="cal-legend-dot today-dot"></div> Today
    </div>
  </div>

  <div class="cal-toolbar">
    <div class="view-toggle" id="view-toggle">
      <button class="view-toggle-btn active" data-view="month">Month</button>
      <button class="view-toggle-btn" data-view="week">Week</button>
    </div>
    <div class="cal-filter-dropdown" id="cal-filter-dropdown">
      <button class="cal-filter-btn" id="cal-filter-btn">
        <span id="cal-filter-btn-label">All workouts</span>
        <span class="cal-filter-count" id="cal-filter-btn-count">0</span>
        <span class="cal-filter-caret">▾</span>
      </button>
      <div class="cal-filter-menu" id="cal-filter-menu"></div>
    </div>
  </div>

  <div class="calendar-grid-wrap" id="month-view-wrap">
    <div class="cal-weekdays">
      <div class="cal-weekday">Mon</div>
      <div class="cal-weekday">Tue</div>
      <div class="cal-weekday">Wed</div>
      <div class="cal-weekday">Thu</div>
      <div class="cal-weekday">Fri</div>
      <div class="cal-weekday">Sat</div>
      <div class="cal-weekday">Sun</div>
    </div>
    <div class="cal-days" id="cal-days"></div>
  </div>

  <div class="cal-week-wrap" id="cal-week-wrap"></div>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Workouts</div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>

  // ---------- SAMPLE DATA (remove when integrating) ----------
  if (typeof workouts === 'undefined') {
    const today = new Date();
    const dk = (d) => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    const offset = (n) => { const d = new Date(today); d.setDate(today.getDate() + n); return d; };
    window.workouts = {
      [dk(offset(-2))]: [
        { name: 'Bench Press',  icon: '🏋️', duration: 45, cat: 'strength', done: true  },
        { name: 'Running',      icon: '🏃', duration: 30, cat: 'cardio',   done: true  },
      ],
      [dk(offset(0))]: [
        { name: 'Squats',       icon: '🦵', duration: 40, cat: 'strength', done: false },
        { name: 'Jump Rope',    icon: '🙂‍↕', duration: 20, cat: 'cardio',  done: false },
        { name: 'Stretching',   icon: '🤸', duration: 15, cat: 'yoga',     done: false },
      ],
      [dk(offset(2))]: [
        { name: 'Basketball',   icon: '🏀', duration: 60, cat: 'other',    done: false },
      ],
      [dk(offset(4))]: [
        { name: 'Deadlift',     icon: '💪', duration: 50, cat: 'strength', done: false },
        { name: 'Burpees',      icon: '❤️‍🔥', duration: 25, cat: 'hiit',  done: false },
      ],
    };
  }
  // -----------------------------------------------------------

  const monthNames = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
  const DAY_NAMES  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const DAY_NAMES_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const CATEGORIES = [
    { key: 'strength', label: 'Strength', icon: '🏋️' },
    { key: 'cardio',   label: 'Cardio',   icon: '🏃' },
    { key: 'yoga',     label: 'Yoga',     icon: '🧘' },
    { key: 'hiit',     label: 'HIIT',     icon: '❤️‍🔥' },
    { key: 'other',    label: 'Other',    icon: '⚡' },
  ];

  const realToday = new Date();
  let currentMonth = realToday.getMonth();
  let currentYear  = realToday.getFullYear();
  let currentView  = 'month'; // 'month' | 'week'

  // Start of the currently viewed week (Monday)
  let currentWeekStart = (() => {
    const d = new Date(realToday);
    const offset = (d.getDay() + 6) % 7; // days since Monday
    d.setDate(d.getDate() - offset);
    d.setHours(0,0,0,0);
    return d;
  })();

  // Active category filter — null means "all workouts"
  let activeFilter = null;

  function filterWorkouts(list) {
    return activeFilter === null ? list : list.filter(w => w.cat === activeFilter);
  }

  function dayKey(d) {
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }

  function fmtDate(d) {
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // ── Filter dropdown: counts how many times each type was done in the visible period ──
  function getPeriodRange() {
    if (currentView === 'week') {
      const start = new Date(currentWeekStart);
      const end = new Date(currentWeekStart);
      end.setDate(end.getDate() + 6);
      end.setHours(23, 59, 59, 999);
      return { start, end };
    }
    const start = new Date(currentYear, currentMonth, 1);
    const end = new Date(currentYear, currentMonth + 1, 0);
    end.setHours(23, 59, 59, 999);
    return { start, end };
  }

  function computeCategoryCounts() {
    const { start, end } = getPeriodRange();
    const counts = {};
    CATEGORIES.forEach(c => counts[c.key] = 0);
    let total = 0;

    Object.keys(workouts).forEach(key => {
      const [y, m, d] = key.split('-').map(Number);
      const date = new Date(y, m, d);
      if (date >= start && date <= end) {
        workouts[key].forEach(w => {
          if (counts.hasOwnProperty(w.cat)) {
            counts[w.cat]++;
            total++;
          }
        });
      }
    });
    return { counts, total };
  }

  function renderFilterMenu() {
    const { counts, total } = computeCategoryCounts();
    const periodWord = currentView === 'week' ? 'this week' : 'this month';

    // Update trigger button
    const btnLabel = document.getElementById('cal-filter-btn-label');
    const btnCount = document.getElementById('cal-filter-btn-count');
    if (activeFilter === null) {
      btnLabel.textContent = 'All workouts';
      btnCount.textContent = total;
    } else {
      const cat = CATEGORIES.find(c => c.key === activeFilter);
      btnLabel.textContent = `${cat.icon} ${cat.label}`;
      btnCount.textContent = counts[cat.key];
    }

    // Build menu
    const menu = document.getElementById('cal-filter-menu');
    menu.innerHTML = '';

    const menuLabel = document.createElement('div');
    menuLabel.className = 'cal-filter-menu-label';
    menuLabel.textContent = `Times done ${periodWord}`;
    menu.appendChild(menuLabel);

    const allItem = document.createElement('div');
    allItem.className = 'cal-filter-item' + (activeFilter === null ? ' selected' : '');
    allItem.innerHTML = `<span class="cal-filter-item-name">All workouts</span><span class="cal-filter-item-count">${total}</span>`;
    allItem.addEventListener('click', () => selectFilter(null));
    menu.appendChild(allItem);

    const divider = document.createElement('div');
    divider.className = 'cal-filter-divider';
    menu.appendChild(divider);

    CATEGORIES.forEach(cat => {
      const item = document.createElement('div');
      item.className = 'cal-filter-item' + (activeFilter === cat.key ? ' selected' : '');
      item.innerHTML = `<span class="cal-filter-item-name">${cat.icon} ${cat.label}</span><span class="cal-filter-item-count">${counts[cat.key]}</span>`;
      item.addEventListener('click', () => selectFilter(cat.key));
      menu.appendChild(item);
    });
  }

  function selectFilter(key) {
    activeFilter = key;
    closeFilterMenu();
    currentView === 'month' ? renderCalendar() : renderWeekView();
  }

  function toggleFilterMenu() {
    const isOpen = document.getElementById('cal-filter-menu').classList.contains('open');
    isOpen ? closeFilterMenu() : openFilterMenu();
  }

  function openFilterMenu() {
    renderFilterMenu();
    document.getElementById('cal-filter-menu').classList.add('open');
    document.getElementById('cal-filter-btn').classList.add('open');
  }

  function closeFilterMenu() {
    document.getElementById('cal-filter-menu').classList.remove('open');
    document.getElementById('cal-filter-btn').classList.remove('open');
  }

  document.getElementById('cal-filter-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleFilterMenu();
  });
  document.getElementById('cal-filter-menu').addEventListener('click', (e) => e.stopPropagation());
  document.addEventListener('click', closeFilterMenu);

  function renderCalendar() {
    document.getElementById('cal-month-label').textContent =
      `${monthNames[currentMonth]} ${currentYear}`;

    const grid = document.getElementById('cal-days');
    grid.innerHTML = '';

    const firstDay  = new Date(currentYear, currentMonth, 1);
    const lastDay   = new Date(currentYear, currentMonth + 1, 0);
    const totalDays = lastDay.getDate();

    // Monday-first offset
    let startDay = (firstDay.getDay() + 6) % 7;

    // Prev month filler
    const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();
    for (let i = 0; i < startDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day other-month';
      const num = document.createElement('div');
      num.className = 'cal-day-num';
      num.textContent = daysInPrev - startDay + i + 1;
      cell.appendChild(num);
      grid.appendChild(cell);
    }

    // Current month days
    for (let day = 1; day <= totalDays; day++) {
      const date  = new Date(currentYear, currentMonth, day);
      const dk    = dayKey(date);
      const isToday = date.toDateString() === realToday.toDateString();
      const rawDayWorkouts = workouts[dk] || [];
      const dayWorkouts = filterWorkouts(rawDayWorkouts);
      const allDone = dayWorkouts.length > 0 && dayWorkouts.every(w => w.done);

      const cell = document.createElement('div');
      cell.className = 'cal-day' + (isToday ? ' today' : '') + (allDone ? ' all-done' : '');

      const num = document.createElement('div');
      num.className = 'cal-day-num';
      num.textContent = day;
      cell.appendChild(num);

      if (allDone) {
        const badge = document.createElement('div');
        badge.className = 'cal-day-done-badge';
        badge.textContent = '✓';
        cell.appendChild(badge);
      }

      // Workout pills
      if (dayWorkouts.length) {
        const pillWrap = document.createElement('div');
        pillWrap.className = 'cal-day-workouts';

        const show = dayWorkouts.slice(0, 2);
        show.forEach(w => {
          const pill = document.createElement('div');
          pill.className = 'cal-workout-pill ' + (w.done ? 'completed' : 'scheduled');
          pill.textContent = (w.icon ? w.icon + ' ' : '') + w.name;
          pillWrap.appendChild(pill);
        });

        if (dayWorkouts.length > 2) {
          const more = document.createElement('div');
          more.className = 'cal-more';
          more.textContent = `+${dayWorkouts.length - 2} more`;
          pillWrap.appendChild(more);
        }

        cell.appendChild(pillWrap);
        cell.addEventListener('click', () => openModal(date, dk, dayWorkouts));
      }

      grid.appendChild(cell);
    }

    // Next month filler
    const totalCells = Math.ceil((startDay + totalDays) / 7) * 7;
    const remaining  = totalCells - startDay - totalDays;
    for (let i = 1; i <= remaining; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day other-month';
      const num = document.createElement('div');
      num.className = 'cal-day-num';
      num.textContent = i;
      cell.appendChild(num);
      grid.appendChild(cell);
    }

    renderFilterMenu();
  }

  // ── Week View ──
  function renderWeekView() {
    const weekEnd = new Date(currentWeekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);

    const sameMonth = currentWeekStart.getMonth() === weekEnd.getMonth();
    const label = sameMonth
      ? `${monthNames[currentWeekStart.getMonth()]} ${currentWeekStart.getDate()}–${weekEnd.getDate()}, ${weekEnd.getFullYear()}`
      : `${monthNames[currentWeekStart.getMonth()]} ${currentWeekStart.getDate()} – ${monthNames[weekEnd.getMonth()]} ${weekEnd.getDate()}, ${weekEnd.getFullYear()}`;
    document.getElementById('cal-month-label').textContent = label;

    const wrap = document.getElementById('cal-week-wrap');
    wrap.innerHTML = '';

    for (let i = 0; i < 7; i++) {
      const date = new Date(currentWeekStart);
      date.setDate(date.getDate() + i);
      const dk = dayKey(date);
      const isToday = date.toDateString() === realToday.toDateString();
      const rawDayWorkouts = workouts[dk] || [];
      const dayWorkouts = filterWorkouts(rawDayWorkouts);
      const allDone = dayWorkouts.length > 0 && dayWorkouts.every(w => w.done);

      const col = document.createElement('div');
      col.className = 'cal-week-col' + (isToday ? ' today' : '') + (allDone ? ' all-done' : '');

      const head = document.createElement('div');
      head.className = 'cal-week-col-head';
      head.innerHTML = `
        <div class="cal-week-dow">${DAY_NAMES_SHORT[i]}</div>
        <div class="cal-week-daynum">${date.getDate()}</div>
      `;
      col.appendChild(head);

      const body = document.createElement('div');
      body.className = 'cal-week-col-body';

      if (dayWorkouts.length) {
        dayWorkouts.forEach(w => {
          const item = document.createElement('div');
          item.className = 'cal-week-workout ' + (w.done ? 'completed' : 'scheduled');
          item.textContent = (w.icon ? w.icon + ' ' : '') + w.name;
          body.appendChild(item);
        });
      } else {
        const empty = document.createElement('div');
        empty.className = 'cal-week-empty';
        empty.textContent = 'Rest day';
        body.appendChild(empty);
      }

      body.addEventListener('click', () => openModal(date, dk, dayWorkouts));
      col.appendChild(body);
      wrap.appendChild(col);
    }

    renderFilterMenu();
  }

  // ── Modal ──
  function openModal(date, dk, dayWorkouts) {
    const dow = DAY_NAMES[(date.getDay() + 6) % 7];
    document.getElementById('modal-title').textContent = `${dow}'s Workouts`;
    document.getElementById('modal-subtitle').textContent = fmtDate(date);

    const body = document.getElementById('modal-body');
    body.innerHTML = '';

    if (!dayWorkouts.length) {
      const empty = document.createElement('div');
      empty.className = 'modal-empty';
      empty.textContent = 'No workouts scheduled for this day.';
      body.appendChild(empty);
    } else {
      dayWorkouts.forEach(w => {
        const item = document.createElement('div');
        item.className = 'modal-workout-item';
        item.innerHTML = `
          <div class="modal-workout-icon">${w.icon || '🏃'}</div>
          <div class="modal-workout-info">
            <div class="modal-workout-name">${w.name}</div>
            <div class="modal-workout-duration">${w.duration} min</div>
          </div>
          <div class="modal-workout-status ${w.done ? 'completed' : 'scheduled'}">
            ${w.done ? 'Done' : 'Scheduled'}
          </div>
        `;
        body.appendChild(item);
      });
    }

    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });

  document.getElementById('prev-month').addEventListener('click', () => {
    if (currentView === 'week') {
      currentWeekStart.setDate(currentWeekStart.getDate() - 7);
      renderWeekView();
    } else {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
    }
  });

  document.getElementById('next-month').addEventListener('click', () => {
    if (currentView === 'week') {
      currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      renderWeekView();
    } else {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar();
    }
  });

  // ── View toggle ──
  document.getElementById('view-toggle').addEventListener('click', (e) => {
    const btn = e.target.closest('.view-toggle-btn');
    if (!btn) return;
    const view = btn.dataset.view;
    if (view === currentView) return;
    currentView = view;

    document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.getElementById('month-view-wrap').style.display = view === 'month' ? '' : 'none';
    document.getElementById('cal-week-wrap').classList.toggle('active', view === 'week');

    if (view === 'week') {
      renderWeekView();
    } else {
      renderCalendar();
    }
  });

  renderCalendar();
</script>
</body>
</html>
